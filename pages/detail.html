<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="tab-title">Detail Film</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <menu-navbar></menu-navbar>

  <main style="margin-top: 120px; padding: 0 7%; color: #fff;">
    <!-- Tag HTML di bawah ini sengaja diberi id agar bisa diisi otomatis oleh JavaScript -->
    <h1 id="film-title" style="color: #ff0000; font-style: italic; margin-bottom: 20px;"></h1>
    
    <div style="display: flex; gap: 30px; flex-wrap: wrap;">
      <img id="film-poster" src="" alt="Poster Film" style="width: 250px; border-radius: 8px; border: 2px solid #333;">
      
      <div style="max-width: 600px;">
        <h3>Sinopsis Film:</h3>
        <p id="film-synopsis" style="color: #aaa; margin-top: 10px; line-height: 1.6;"></p>
        
        <br>
        <p id="film-quality" style="color: #ff6600; font-weight: bold;"></p>
        
        <a href="#" style="display: inline-block; margin-top: 20px; background-color: #ff0000; color: #fff; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 4px;">
          Mulai Streaming
        </a>
      </div>
    </div>
  </main>

  <!-- PANGGIL DATA DAN ROBOT PENGISI KONTEN -->
  <script src="../components/navbar.js"></script>
  <script src="../components/data.js"></script>
  <script>
    // Robot JavaScript untuk mendeteksi film apa yang sedang diklik
    const urlParams = new URLSearchParams(window.location.search);
    const kodeFilm = urlParams.get('id'); // Mengambil tulisan setelah ?id=

    // Mengambil data dari databaseFilm berdasarkan kode
    const dataFilm = databaseFilm[kodeFilm];

    if (dataFilm) {
      // Menyuntikkan data film ke dalam cetakan HTML di atas
      document.getElementById('tab-title').innerText = dataFilm.judul;
      document.getElementById('film-title').innerText = dataFilm.judul;
      document.getElementById('film-poster').src = dataFilm.poster;
      document.getElementById('film-synopsis').innerText = dataFilm.sinopsis;
      document.getElementById('film-quality').innerText = "Kualitas: " + dataFilm.kualitas;
    } else {
      document.getElementById('film-title').innerText = "Film Tidak Ditemukan";
    }
  </script>
</body>
</html>
